# docker-compose.yml
services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-keycloak-app
    ports:
      - "8081:8081"